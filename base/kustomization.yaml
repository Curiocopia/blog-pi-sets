apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: pi-sets

configMapGenerator:
- name: pi-sets-environment-vars
  env: pi-sets.env

labels:
  - pairs:
      app: blog-pi-sets
    includeSelectors: false

resources:
  - pi-pvc.yaml
  - pi-merger-job.yaml
  - pi-worker-service.yaml
  - pi-worker-statefulset.yaml
  - pi-worker-vpa.yaml